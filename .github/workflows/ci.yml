name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bridge:
    name: bridge (lint, types, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Tests
        run: pytest -q

  plugin:
    name: plugin (lint only — runs inside Cura, not in CI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff (plugin)
        run: ruff check cura-plugin
      # NOTE: plugin operations/adapters require a live Cura runtime and cannot
      # be exercised headless in CI. They are validated via the documented
      # manual smoke test against a real Cura install.
