name: Release

# On a published GitHub Release (the explicit human gate — nothing runs on a
# normal push or PR): publish the bridge to PyPI (Trusted Publishing / OIDC, no
# stored token) and attach the installable Cura plugin zip to the release.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: Build & publish (cura-mcp)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cura-mcp/
    permissions:
      id-token: write # required for Trusted Publishing
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Build
        run: uv build
      - name: Publish to PyPI (trusted publishing)
        run: uv publish

  plugin-zip:
    name: Attach Cura plugin zip
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the release asset
    steps:
      - uses: actions/checkout@v7
      - name: Build plugin zip
        run: python scripts/package_plugin.py
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/CuraMcp-*.zip --clobber
