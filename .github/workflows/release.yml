name: Release (PyPI)

# Publishes the bridge to PyPI when you publish a GitHub Release (the explicit
# human gate — nothing is published on a normal push or PR). Uses PyPI Trusted
# Publishing (OIDC): no API token is stored in the repo.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: Build & publish (cura-mcp)
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cura-mcp/
    permissions:
      id-token: write # required for Trusted Publishing
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build
        run: uv build
      - name: Publish to PyPI (trusted publishing)
        run: uv publish
